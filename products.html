<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workwear Wraps</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
      .kit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /*fr sets the column grid to a fraction of the screen size (adjusts so might be best)... https://www.w3schools.com/css/css_grid_tracks.asp*/
      gap: 20px;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
      }
     
      .kit-card{
        height: 100%;
        background-color: #ffffff;
        border-radius: 15px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .kit-button{
        align-self: center;
        background-color: #647D69;
        border: none;
        border-radius: 20px;
        padding: 15px 48px;
      }
      .kit-text{
        padding: 2px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        
      }
      .kit-card-title{
        font-size: 18px;
        font-weight: normal;
      }
      .kit-description{
        font-size: 13px;
        color: #000000;
      }
      .kit-text a {
        align-self: center;
      }
      .kit-image{
        width: auto;
        height: 200px;
        border-radius: 10px;
        object-fit: cover;
        background-color: #D9D9D9;
      }
      body{
        background-color: #E5F4E9;
      }
      .page-container p{
        color: #647D69; /*text color*/
      }

    </style>
  </head>

  <body>
    <header class="header">
      <div class="header-container"></div>
    </header>

    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
                    <path fill="currentColor" fill-rule="evenodd" d="M3.213 3.213a4.14 4.14 0 0 0 0 5.858L14.93 20.787a4.142 4.142 0 0 0 5.858-5.858L9.07 3.213a4.14 4.14 0 0 0-5.858 0m6.132 5.018A.788.788 0 1 0 8.23 9.345A.788.788 0 0 0 9.345 8.23m2.784.928a.787.787 0 1 0-1.114 1.114a.787.787 0 0 0 1.114-1.114m3.712 3.712a.788.788 0 1 1-1.114 1.114a.788.788 0 0 1 1.114-1.114m.929 3.899a.787.787 0 1 0-1.114-1.114a.787.787 0 0 0 1.114 1.114m-3.713-3.713a.787.787 0 1 0-1.113-1.114a.787.787 0 0 0 1.113 1.114m.928 1.67a.788.788 0 1 1-1.114 1.114a.788.788 0 0 1 1.114-1.113M9.16 11.016a.787.787 0 1 1 1.114 1.114a.787.787 0 0 1-1.114-1.114" clip-rule="evenodd" />
                    <path fill="currentColor" d="M20.787 9.071a4.142 4.142 0 0 0-5.858-5.858L12 6.143L17.858 12zM12 17.858L6.142 12l-2.929 2.929a4.142 4.142 0 0 0 5.858 5.858z" opacity="0.5" />
                </svg>
                Workwear Wraps
            </a>
        <span class="circle">
          <h1 style="color: var(--green)" id="toggleBar">☰</h1>
        </span>
        <ul class="nav-links">
    <li><a href="about.html">About Us</a></li>
    <li><a href="products.html">Products</a></li>
    <li class="dropdown">
        <button id="resourcesBtn">
            Resources
            <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="dropdownOptions">
            <a href="reviews.html">Reviews</a>
            <a href="resources.html">FAQs</a>
        </div>
    </li>
    <li>
      <a href="contact.html"><button class="button">Contact</button></a>
    </li>
    </ul>
      </div>
    </nav>

    <div class="page-container">
      <h1>Products</h1>
      <p>First aid designed for you. 
        Every product is made to meet the demands of your profession. </p>
    </div>

    <div class="kit-grid" id="kit-grid"></div> <!--the grid to store the cards-->

    <footer>
      <div class="footer-section">
        <div class="footer-bottom">
          <p>
            &copy; 2026 Workwear Wraps. All rights reserved. |
            <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a>
          </p>
        </div>
      </div>
    </footer>
    <script>
      //array of objects (the products)!
      var products = [ 
        {
          name: "Preforming Arts Kit",
          description: "A kit designed for dancers, musicians and stage crew. This kit contains skin-safe adhesives for every movement, costume change, or instrument.",
          link: "performing-arts.html",
          image: "images/performing.jpg"
        },
        {
          name: "Sports & Fitness Kit",
          description: "For athletes and trainers. This kit contains extra-durable, sweat-wicking bandages that can protect though all reps.",
          link: "sports-fitness.html",
          image: "images/sports.jpg"
        },
        {
          name: "Medical & Clinical Kit",
          description: "This kit is designed for patient home-care or in-office work. It provides sterile wound care no matter the place.",
          link: "medical.html",
          image: "images/med.jpg"
        },
        {
          name: "Visual Arts Kit",
          description: "Designed to survive the abrasive reality of all mix-media studios. This kit contains thin waterproof seals that won’t get in the way.",
          link: "visual-arts.html",
          image: "images/visual_arts.jpg"
        }
      ];
      var grid = document.getElementById("kit-grid"); //DOM object
      products.forEach(function(product){
        grid.innerHTML +=
          '<div class="kit-card">' +
            '<div class="kit-image"><img src="' + product.image + '" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>' +
            '<div class="kit-text">' +
              '<h3 class="kit-card-title">'+ product.name +'</h3>' +
              '<p class="kit-description">' + product.description + '</p>'
              + '<a href="' + product.link + '"><button class="button">Learn More</button></a>' 
              + ' </div>' + '</div>';
      });
      let getHamburger = document.querySelector("#toggleBar");
      getHamburger.addEventListener("click", function () {
        document.querySelector(".nav-links").classList.toggle("hamburger");
      });

      let resources = document.querySelector("#resourcesBtn");
      resources.addEventListener("click", function (e) {
        e.stopPropagation();
        document.querySelector(".dropdownOptions").classList.toggle("open");
      });
    </script>
  </body>
</html>
